<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Nguyễn Anh Tấn</title>
    </head>
    <style>
        *
::before {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #221e1ec4;
    color: #000000;
    font-size: 30px;
    font-family: Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.register-form{
    width:70vw;
    height:70vh;
    padding: 2rem;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
    background-color:rgb(204, 28, 28);
    border-radius: 2px;
    box-sizing: border-box;
}

.register-form h2 {
    margin-bottom: 1.5rem;
    text-align: center;
}

.input-row {
    margin-bottom: 2rem;
}
.input-row input {
    width: 100%;
    border: 1px solid rgb(58, 72, 104);
    height: 40px;
    line-height: 40px;
    padding: 0 1rem;
    outline: none;
    transition: all 0.3s ease-out;
}
.input-row input:focus {
    border: 1px solid #00bfa6;
    outline: none;
}
.input__note textarea {
    width: 100%;
    min-height: 200px;
    border: 1px solid #ccc;
    user-select: none;
    resize: none;
    padding: 1rem;
}
.input__note textarea:focus {
    border: 1px solid #00bfa6;
}
.input-row {
    position: relative;
}
.input-row:last-child {
    margin-bottom: 0;
}
.input-row.success input {
    border-color: #2ecc71;
}
.input-row.error input {
    border-color: #e74c3c;
}
.input-row small {
    color: #e74c3c;
    position: absolute;
    bottom: -20px;
    left: 0;
    visibility: hidden;
    font-size: 12px;
}
.input-row.error small {
    visibility: visible;
}
.btn {
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 2px;
    -webkit-transition: 0.5s;
    -o-transition: 0.5s;
    transition: 0.5s;
    padding: 8px 15px !important;
}
#btn-register {
    color: #fff;
    background-color: rgb(255, 188, 2);
    border: 2px solid black;
    outline: 0;
    cursor: pointer;
    text-decoration: none !important;
    position: relative;
    z-index: 10;
    overflow: hidden;
}
    </style>
    <body>
        <div class="register-form">
        <h2>THÔNG TIN TRUY CẬP</h2>
        <div class="input-row">
            <input type="text" placeholder="Họ tên"autocomplete="off" />
            <small>Error message</small>
        </div>
        <div class="input-row">
            <input type="Email" placeholder="Email"autocomplete="off"/>
            <small>Error message</small>
        </div>
        <div class="input-row">
            <input type="" placeholder="Giới tính" autocomplete="off" />
            <small>Error message</small>
        </div>
        <div class="input-row">
            <input type="" placeholder="Quốc tịch" autocomplete="off" />
            <small>Error message</small>
        </div>
        <div class="input-row">
            <input type="" placeholder="Sở thích"autocomplete="off" />
            <small>Error message</small>
        </div>
        <div class="input-row">
            <button class="btn" id="btn-register">
                TRUY CẬP 
            </button>
        </div>
    </div>
    </body>
</html>
