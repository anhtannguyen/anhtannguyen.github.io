<html chan="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title> Nguyễn Anh Tấn </title>
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    </head>
    <!-- Head= chỉ để chỉnh sửa web ko hiện thị-->
    <style>
        /* Height = Y; Width = X */
        /* thuộc tính chia 4 đến 1 phần:
            4 là Top-Right-bottom-left
            3 là Top-Right=left-bottom
            2 là Top=bottom-Right=left
            1 là mỗi bên nhau */
            
        *{
            margin:0;
            padding:0;

        }
        body{
            background-color:var(--pink-color1);
        }        
        /* đầu trang */
        .headercodinh{
            position:fixed;
            top:0;
            left:0;
            right:0;
        }
        .header{
            background-color:var(--pink-color1);
            color:black;
            padding:10vh;
            text-align:center;
            font-size:2em;
        }
        .navbar {
        overflow: hidden;
        background-color:rgba(202, 202, 202, 0.575);
        border:3px solid black;
        }
        .navbar a {
        border:2px solid black;
        float: left;
        display: block;
        color:black;
        text-align: center;
        padding: 14px 20px;
        text-decoration: none;
        }
        .navbar a:hover {
        background-color:orange;
        color: black;
        }
        /* Khai báo biến toàn cục */
        :root{
            --pink-color:black;
            --pink-color1:rgba(0,80,89,1);
        }
        /* nút chọn của anime,nhạc,ảnh */
        button{
            font-size:2rem;
            width:35vw;
            height:25vh;
            outline:auto;
            background-color:rgba(202, 202, 202, 0.575);
            border: 2px solid var(--pink-color);
            box-sizing:border-box;/* Border-box=context+padding+border */
            cursor: pointer;
            transition: 0.4s;/* thời gian chuyển động hiệu ứng */
        }
        /* :hover là chức năng chuyển đổi của Transition */
        button:hover {
            background-color:orange;
        }
        .the12,.the34{
            display:flex;
            justify-content: space-evenly;
            flex-wrap: wrap;
        }
        form{
            margin:2em;
        }
        .the12{
            margin-top:18em;
        }
        /* anh123 là phần canh chỉnh khung của link anime.nhạc,ảnh */
    </style>
    <!-- style= tạo kiểu cho thẻ,có hiển thị-->
    <body>
        <div class="headercodinh">
            <div class="header">
                <h1> NGUYỄN ANH TẤN</h1>
            </div>
            <div class="navbar"></div>
        </div>
            <div class="the12">
                <div class="the1">
                    <form action="https://anhtannguyen.github.io/20220702.12h.web1/" >
                        <button>Thẻ giới thiệu</button>
                    </form>
                </div>
                <div class="the2">
                    <form action="https://anhtannguyen.github.io/theamnhac.github.io/">
                        <button>Âm nhạc</button>
                    </form>       
                </div>
            </div>   
            <div class="the34"> 
                <div class="the3">    
                    <form action="">
                        <button>Khoảng khắc vui vẻ</button>
                    </form>
                </div>
                <div class="the4">
                    <form action="">
                        <button>Trò chơi</button>
                    </form>
                </div>
                <div class="the5">
                    <audio>
                    </audio>
                </div>
            </div>
    </body>
</html>
