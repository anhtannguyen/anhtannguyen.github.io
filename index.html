<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sở thích</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="JavaScritp.js">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<style>
    *{
        margin:0;
        padding:0;
    }
    title{
        text-transform: uppercase;
    }
    html{
        font-family: 'Times New Roman', Times, serif;
        size: 16;
        
    }
    body{
        box-sizing: border-box;
        font-family: sans-serif;
        background: #008080;
    }
    div{
        align-content: center;
        justify-content: center;
    }
    ul{
        position: relative;
        width: 450px;
        margin:200px auto 0;
        padding:20px;
        box-sizing: border-box;
        background: rgba(0,0,0,.1);
        box-shadow: inset 0 0 15px rgba(0,0,0,.3);
        border-radius: 5px;
        overflow: hidden;
    }
    ul li{
        display: flex;
        background: rgba(255,255,255,.1);
        padding:10px 20px;
        color:#fff;
        margin:5px 0;
        transition: .5s;
    }
    ul li:nth-child(1){
        background: rgba(255,255,255,.6);
    }
    ul li:nth-child(2){
        background: rgba(255,255,255,.4);
    }
    ul li:nth-child(3){
        background: rgba(255,255,255,.2);
    }
    ul li:nth-child(4){
        background: rgba(255,255,255,.1);
    }
    ul li span:nth-child(1){
        width:30px;
    }
    ul li span:nth-child(2){
        width:200px;
    }
    ul li span:nth-child(3){
        width:100px;
        text-align:right;
    }
    ul li span:nth-child(4){
        width:70px;
        text-align:right;
    }
    ul li:hover{
        transform: scale(1.06);
        background: #ff72;
    }
   /*h3{
        margin: 20px  ;
        width: 90px;
        height: 30px;
        border: 3px black solid;
        align-content: center;
        justify-content: center;
    }*/
    header{
        width:100%;
        height: 50px;
        border-bottom: 2px black solid;
        text-transform: uppercase;/*Viết Hoa tất cả chữ*/
        
    }
    .number{
        color: #020202;
    }
    a{
        color: (internal value);
        text-decoration:none;/* hủy viền gạch dưới chân chỗ hiện thị bấm link */
        cursor: auto;/* chọn con trỏ */
    }
</style>
<body>
    <header>
        <div class="title">
            <h3>nguyễn anh tấn</h3>
        </div>
    </header>
    <ul><a href="https://www.youtube.com/watch?v=zfp6ZaIPVjU">
        <li >
            <span class="number">1</span>
            <span class="name">Âm nhạc</span>
            <span class="points">80</span>
            <span class="badge"><i class="fa-solid fa-headphones"></i></span>
        </li></a>
        <li>
            <span class="number">2</span>
            <span class="name">Kiến thức</span>
            <span class="points">85</span>
            <span class="badge"><i class="fa-solid fa-book"></i></span>
        </li>
        <li>
            <span class="number">3</span>
            <span class="name">Hình ảnh</span>
            <span class="points">90</span>
            <span class="badge"><i class="fa-solid fa-image"></i></span>
        </li>
        <li>
            <span class="number">4</span>
            <span class="name">Trang xã hội</span>
            <span class="points">95</span>
            <span class="badge"><i class="fa-sharp fa-solid fa-globe"></i></span>
        </li>
        <li>
            <span class="number">5</span>
            <span class="name"> Baymax</span>
            <span class="points">100</span>
            <span class="badge" ><i class="fa-solid fa-user-nurse"></i></span>
        </li>
    </ul>
</body>
</html>
